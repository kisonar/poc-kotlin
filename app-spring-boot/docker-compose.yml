services:

  # MariaDB
  mariadb:
    image: mariadb:12.2.2-noble
    environment:
      #MARIADB_RANDOM_ROOT_PASSWORD: "true"
      MARIADB_DATABASE: default_database
      MARIADB_USER: user
      MARIADB_PASSWORD: pass
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./mariadb-data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d/
    ports:
      - "3306:3306"

  adminer:
    image: adminer
    restart: always
    ports:
      - "8085:8080"

  mongo:
    image: mongo:7.0.30
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: marcin-user
      MONGO_INITDB_ROOT_PASSWORD: marcin-password
      MONGO_INITDB_DATABASE: marcin-database
    volumes:
      - ./mondo-data:/data/db

  mongo-express:
    image: mongo-express:0.54.0
    restart: always
    ports:
      - "9000:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password