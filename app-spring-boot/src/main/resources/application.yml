logging:
  level:
    root: INFO
    kisonar.poc.kotlin.app.service: DEBUG

spring:
  cloud.config.enabled: false
  main:
    banner-mode: console

  application:
    name: kisonar-poc-kotlin-spring-boot

  mongodb:
    uri: mongodb://marcin-user:marcin-password@localhost:27017/hiven?authSource=admin&authMechanism=SCRAM-SHA-1
  data:
    mongodb:
      auto-index-creation: true

  management:
    info:
      java:
        enabled: true
    endpoints:
      web:
        exposure:
          include: health, info